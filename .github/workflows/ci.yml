name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-15]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt --component clippy
      - run: scripts/verify-local.sh

  windows-build:
    name: windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.95.0 --profile minimal --component clippy --target x86_64-pc-windows-msvc
      - run: cargo check --locked --target x86_64-pc-windows-msvc --all-targets
      - run: cargo clippy --locked --target x86_64-pc-windows-msvc --all-targets -- -D warnings
      - run: cargo test --locked --target x86_64-pc-windows-msvc lock::tests::second_lock_is_busy
      - run: cargo test --locked --target x86_64-pc-windows-msvc paths::tests::current_os_user_prefers_username_on_windows
      - run: cargo test --locked --target x86_64-pc-windows-msvc process::tests::matches_windows_exe_names_case_insensitively
      - run: cargo test --locked --target x86_64-pc-windows-msvc process::tests::parses_quoted_csv_fields
      - run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/manual-evidence.ps1 -Help
      - run: cargo build --locked --release --target x86_64-pc-windows-msvc
      - name: Package Windows release archive
        shell: bash
        run: |
          bash scripts/package-release.sh ci-windows x86_64-pc-windows-msvc target/x86_64-pc-windows-msvc/release/any-switch.exe .
          tar -tzf any-switch-ci-windows-x86_64-pc-windows-msvc.tar.gz > windows-package-list.txt
          grep -Fx "any-switch-ci-windows-x86_64-pc-windows-msvc/any-switch.exe" windows-package-list.txt
