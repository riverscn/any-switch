name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt --component clippy
      - uses: Swatinem/rust-cache@v2
      - run: scripts/verify-local.sh

  build:
    name: build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install 1.95.0 --profile minimal --target ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: bash scripts/package-release.sh "${{ github.ref_name }}" "${{ matrix.target }}"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            switch-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            switch-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
