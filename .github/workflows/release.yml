name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt --component clippy
      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo pkgid | sed -n 's/.*[#@]//p')"
          if [[ -z "${version}" ]]; then
            echo "could not read package version from cargo pkgid" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version v${version}" >&2
            exit 1
          fi
      - run: scripts/verify-local.sh

  publish:
    name: publish release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
